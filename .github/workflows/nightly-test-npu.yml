name: Nightly Test (NPU)

on:
  schedule:
    - cron: '0 17 * * *'  # Execute at 1:00 a.m. Beijing Time every day
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/nightly-test-npu.yml"
  workflow_dispatch:
  workflow_call:
    inputs:
      ref:
        description: 'Git ref (branch, tag, or SHA) to test. If not provided, uses the default branch.'
        required: false
        type: string
        default: ''
      job_filter:
        description: 'Select which job to run (leave empty or "all" to run all jobs)'
        required: false
        type: string
        default: 'all'

concurrency:
  group: nightly-test-npu-${{ inputs.ref || github.ref }}
  cancel-in-progress: ${{ github.event_name != 'workflow_call' }}

jobs:
  nightly-1-npu-a3:
    runs-on: linux-arm64-npu-1
    strategy:
      fail-fast: false
      matrix:
        part: [0, 1]
    container:
      image: swr.cn-southwest-2.myhuaweicloud.com/base_image/ascend-ci/cann:8.5.0-a3-ubuntu22.04-py3.11
      env:
        # uv 配置
        UV_INDEX_URL: http://cache-service.nginx-pypi-cache.svc.cluster.local/pypi/simple
        UV_EXTRA_INDEX_URL: https://pypi.tuna.tsinghua.edu.cn/simple
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
      - name: Install uv (if not pre-installed)
        run: |
          UV_VERSION="0.9.30"
          FILENAME="uv-${UV_VERSION}-aarch64-unknown-linux-musl.tar.gz"
          DOWNLOAD_FILENAME="uv-aarch64-unknown-linux-musl.tar.gz"
          CACHE_DIR="/shared-data/uv"
          if [ -f "$CACHE_DIR/$FILENAME" ]; then
            echo "Found cached uv package successfully"
          else
            echo "uv package not found in cache. Downloading..."
            mkdir -p "$CACHE_DIR"
            apt update && apt install -y curl
            curl --connect-timeout 30 --retry 3 -L "https://github.com/astral-sh/uv/releases/download/${UV_VERSION}/uv-aarch64-unknown-linux-musl.tar.gz" -o "$CACHE_DIR/$DOWNLOAD_FILENAME"
            mv "$CACHE_DIR/$DOWNLOAD_FILENAME" "$CACHE_DIR/$FILENAME"
          fi
          mkdir -p /tmp/uv
          tar -xzf "$CACHE_DIR/$FILENAME" -C /tmp/uv
          mv /tmp/uv/uv-aarch64-unknown-linux-musl/uv /usr/local/bin/
          chmod +x /usr/local/bin/uv
          echo "=== uv version ==="
          uv --version
          echo "=== uv configuration ==="
          uv cache dir
      - name: Install dependencies
        run: |
          # speed up by using infra cache services
          CACHING_URL="cache-service.nginx-pypi-cache.svc.cluster.local"
          sed -Ei "s@(ports|archive).ubuntu.com@${CACHING_URL}:8081@g" /etc/apt/sources.list
          pip config set global.index-url http://${CACHING_URL}/pypi/simple
          pip config set global.extra-index-url "https://pypi.tuna.tsinghua.edu.cn/simple"
          pip config set global.trusted-host "${CACHING_URL} pypi.tuna.tsinghua.edu.cn"

          bash scripts/ci/npu/npu_ci_install_dependency.sh a3
          # copy required file from our daily cache
          #cp ~/.cache/modelscope/hub/datasets/otavia/ShareGPT_Vicuna_unfiltered/ShareGPT_V3_unfiltered_cleaned_split.json /tmp
          # copy download through proxy
          curl -o /tmp/test.jsonl -L https://gh-proxy.test.osinfra.cn/https://raw.githubusercontent.com/openai/grade-school-math/master/grade_school_math/data/test.jsonl

